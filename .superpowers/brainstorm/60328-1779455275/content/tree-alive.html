<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tree Growth — Realistic</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0f0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    font-family: -apple-system, sans-serif;
    padding: 20px 10px;
    gap: 16px;
  }
  h1 { color: #6fcf5a; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.7; }
  .stages {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 20px;
    width: 100%;
    max-width: 1000px;
  }
  .stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  canvas {
    border-radius: 16px;
    background: radial-gradient(ellipse at 50% 80%, #0d1a0d 0%, #060c06 100%);
    display: block;
  }
  .label {
    color: #6fcf5a;
    font-size: 11px;
    letter-spacing: 1px;
    opacity: 0.8;
    text-align: center;
  }
  .days {
    color: #3a5c3a;
    font-size: 10px;
    margin-top: -4px;
  }
</style>
</head>
<body>
<h1>Daily Tree — Growth Stages</h1>
<div class="stages" id="stages"></div>

<script>
// ─── Seeded random for consistency ───────────────────────────────────────────
function seededRng(seed) {
  let s = seed;
  return () => {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 4294967296;
  };
}

// ─── Colour helpers ───────────────────────────────────────────────────────────
function hsl(h,s,l,a=1){return `hsla(${h},${s}%,${l}%,${a})`;}

// ─── Ground + ambient ────────────────────────────────────────────────────────
function drawGround(ctx, cx, gy, w) {
  // soft shadow under tree
  const shadow = ctx.createRadialGradient(cx, gy, 0, cx, gy, w*0.55);
  shadow.addColorStop(0, 'rgba(0,0,0,0.45)');
  shadow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = shadow;
  ctx.beginPath();
  ctx.ellipse(cx, gy+4, w*0.55, 12, 0, 0, Math.PI*2);
  ctx.fill();

  // soil line — dark rich earth
  const g = ctx.createLinearGradient(0, gy-2, 0, gy+18);
  g.addColorStop(0,   '#1a1008');
  g.addColorStop(0.4, '#221508');
  g.addColorStop(1,   '#0a0805');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.ellipse(cx, gy+4, w*0.5, 10, 0, 0, Math.PI*2);
  ctx.fill();

  // rim highlight
  ctx.strokeStyle = 'rgba(120,90,50,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.ellipse(cx, gy, w*0.45, 5, 0, 0, Math.PI);
  ctx.stroke();
}

// ─── Roots ────────────────────────────────────────────────────────────────────
function drawRoots(ctx, cx, gy, scale, rng) {
  const angles = [-75, -50, -30, 30, 55, 80];
  angles.forEach((deg, i) => {
    const a = deg * Math.PI / 180;
    const len = (28 + rng()*14) * scale;
    const w0 = (3.5 + rng()*1.5) * scale;
    const ex = cx + Math.cos(a)*len;
    const ey = gy + Math.abs(Math.sin(a))*len*0.55;

    // slight random ctrl point
    const cx1 = cx + Math.cos(a)*len*0.4 + (rng()-0.5)*10;
    const cy1 = gy + Math.abs(Math.sin(a))*len*0.2;

    const g = ctx.createLinearGradient(cx, gy, ex, ey);
    g.addColorStop(0, `rgba(${82+i*3},${58+i},${32},0.9)`);
    g.addColorStop(1, `rgba(60,40,20,0)`);

    ctx.strokeStyle = g;
    ctx.lineWidth = w0;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx, gy);
    ctx.quadraticCurveTo(cx1, cy1, ex, ey);
    ctx.stroke();

    // tiny sub-root
    if (scale > 0.55) {
      const sa = a + (rng()-0.5)*0.6;
      const slen = len * 0.45;
      ctx.strokeStyle = `rgba(60,40,20,${0.4*scale})`;
      ctx.lineWidth = w0 * 0.35;
      ctx.beginPath();
      ctx.moveTo(ex*0.7+cx*0.3, ey*0.7+gy*0.3);
      ctx.quadraticCurveTo(
        ex*0.7+cx*0.3 + Math.cos(sa)*slen*0.4,
        ey*0.7+gy*0.3 + Math.abs(Math.sin(sa))*slen*0.3,
        ex*0.7+cx*0.3 + Math.cos(sa)*slen,
        ey*0.7+gy*0.3 + Math.abs(Math.sin(sa))*slen*0.55
      );
      ctx.stroke();
    }
  });
}

// ─── Single branch with taper + bark texture ──────────────────────────────────
function drawBranchSeg(ctx, x0, y0, x1, y1, w0, w1, col, rng) {
  // main tapered body
  const ang = Math.atan2(y1-y0, x1-x0);
  const perp = ang + Math.PI/2;
  const dx = Math.cos(perp), dy = Math.sin(perp);

  ctx.beginPath();
  ctx.moveTo(x0 + dx*w0/2, y0 + dy*w0/2);
  ctx.quadraticCurveTo(
    (x0+x1)/2 + dx*(w0+w1)/4,
    (y0+y1)/2 + dy*(w0+w1)/4,
    x1 + dx*w1/2, y1 + dy*w1/2
  );
  ctx.quadraticCurveTo(
    (x0+x1)/2 - dx*(w0+w1)/4,
    (y0+y1)/2 - dy*(w0+w1)/4,
    x0 - dx*w0/2, y0 - dy*w0/2
  );
  ctx.closePath();
  ctx.fillStyle = col;
  ctx.fill();

  // bark texture — faint lighter streaks
  const nLines = Math.floor(w0*0.7)+1;
  for(let i=0;i<nLines;i++){
    const t = (i+0.5)/nLines - 0.5; // -0.5..0.5
    ctx.beginPath();
    ctx.moveTo(x0 + dx*t*w0*0.7, y0 + dy*t*w0*0.7);
    ctx.lineTo(x1 + dx*t*w1*0.7, y1 + dy*t*w1*0.7);
    ctx.strokeStyle = `rgba(255,220,160,${0.06 + rng()*0.04})`;
    ctx.lineWidth = 0.4 + rng()*0.3;
    ctx.stroke();
  }
}

// ─── Recursive branching L-system style ───────────────────────────────────────
function growBranch(ctx, x, y, angle, length, width, depth, maxDepth, rng, leafData) {
  if (width < 0.4 || length < 3) return;

  // compute endpoint with slight natural curve
  const curve = (rng()-0.5) * 0.18; // random bend
  const midAngle = angle + curve * 0.5;
  const endAngle = angle + curve;

  const mx = x + Math.cos(midAngle)*length*0.5;
  const my = y + Math.sin(midAngle)*length*0.5;
  const ex = x + Math.cos(endAngle)*length;
  const ey = y + Math.sin(endAngle)*length;

  // colour: darker at base, slightly lighter toward tips
  const brightness = 30 + (1 - depth/maxDepth)*22;
  const r = Math.round(75 + brightness*0.7 + rng()*8);
  const g2 = Math.round(52 + brightness*0.5 + rng()*6);
  const b = Math.round(28 + brightness*0.3 + rng()*4);
  const col = `rgb(${r},${g2},${b})`;

  const endWidth = width * (0.62 + rng()*0.05);

  // draw the segment in two halves for natural curve
  drawBranchSeg(ctx, x, y, mx, my, width, (width+endWidth)/2, col, rng);
  drawBranchSeg(ctx, mx, my, ex, ey, (width+endWidth)/2, endWidth, col, rng);

  if (depth >= maxDepth) {
    // leaf cluster here
    leafData.push({x: ex, y: ey, r: 9 + rng()*7, depth});
    return;
  }

  // split into 2-3 children
  const nChildren = depth < 2 ? 2 : (rng() < 0.35 ? 3 : 2);
  const spreadBase = 0.45 + rng()*0.15;

  for(let i=0; i<nChildren; i++){
    const side = nChildren===2 ? (i===0?-1:1) : (i-1);
    const spread = spreadBase * (0.8 + rng()*0.4);
    const childAngle = endAngle + side * spread * (1 - depth/maxDepth*0.3);
    const lenRatio = 0.6 + rng()*0.1;
    growBranch(ctx, ex, ey, childAngle, length*lenRatio, endWidth, depth+1, maxDepth, rng, leafData);
  }
}

// ─── Leaf cluster (individual leaf shapes) ────────────────────────────────────
function drawLeafCluster(ctx, cx, cy, r, rng, season='summer') {
  const nLeaves = Math.floor(18 + rng()*14);

  // back leaves first (darker)
  for(let pass=0;pass<2;pass++){
    const n = pass===0 ? Math.floor(nLeaves*0.55) : Math.ceil(nLeaves*0.45);
    const shade = pass===0 ? 0 : 1;

    for(let i=0;i<n;i++){
      // distribute leaves in rough ellipse
      const t = rng()*Math.PI*2;
      const rd = (0.15 + rng()*0.85) * r;
      const lx = cx + Math.cos(t)*rd*(1.1 + rng()*0.2);
      const ly = cy + Math.sin(t)*rd*0.75; // elliptical crown

      // single leaf
      const leafLen = (r*0.38 + rng()*r*0.28);
      const leafW = leafLen * (0.45 + rng()*0.25);
      const leafAngle = rng()*Math.PI*2;

      // leaf colours — natural variation
      let h = 108 + rng()*28;  // green hue range
      let s = 45 + shade*15 + rng()*12;
      let l = shade===0 ? (18+rng()*8) : (26+rng()*10);

      ctx.save();
      ctx.translate(lx, ly);
      ctx.rotate(leafAngle);

      // leaf shape: pointed ellipse
      ctx.beginPath();
      ctx.ellipse(0, 0, leafLen*0.5, leafW*0.5, 0, 0, Math.PI*2);
      ctx.fillStyle = hsl(h,s,l, 0.88 + rng()*0.12);
      ctx.fill();

      // central vein
      if(shade===1 && leafLen>6){
        ctx.beginPath();
        ctx.moveTo(-leafLen*0.4, 0);
        ctx.lineTo(leafLen*0.45, 0);
        ctx.strokeStyle = hsl(h,s,l+8, 0.3);
        ctx.lineWidth = 0.4;
        ctx.stroke();
      }

      ctx.restore();
    }
  }

  // ambient glow underneath
  const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, r*1.2);
  glow.addColorStop(0, 'rgba(80,180,60,0.07)');
  glow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.ellipse(cx, cy, r*1.2, r*0.9, 0, 0, Math.PI*2);
  ctx.fill();
}

// ─── Trunk only (for early stages) ───────────────────────────────────────────
function drawTrunkOnly(ctx, cx, base, height, width, rng, lean=0) {
  const tip = { x: cx + lean, y: base - height };
  const ctrl1 = { x: cx + lean*0.2 + (rng()-0.5)*4, y: base - height*0.35 };
  const ctrl2 = { x: cx + lean*0.6 + (rng()-0.5)*3, y: base - height*0.7 };

  // draw tapered trunk
  const steps = 20;
  for(let i=0;i<steps;i++){
    const t0 = i/steps, t1=(i+1)/steps;
    const p0 = cubicBezierPoint(cx, base, ctrl1.x, ctrl1.y, ctrl2.x, ctrl2.y, tip.x, tip.y, t0);
    const p1 = cubicBezierPoint(cx, base, ctrl1.x, ctrl1.y, ctrl2.x, ctrl2.y, tip.x, tip.y, t1);
    const w0 = width * (1 - t0*0.85);
    const w1 = width * (1 - t1*0.85);

    const brightness = 28 + t0*15;
    const col = `rgb(${Math.round(80+brightness*0.5)},${Math.round(55+brightness*0.35)},${Math.round(30+brightness*0.2)})`;
    drawBranchSeg(ctx, p0.x, p0.y, p1.x, p1.y, w0, w1, col, rng);
  }
  return { x: tip.x, y: tip.y };
}

function cubicBezierPoint(x0,y0,x1,y1,x2,y2,x3,y3,t){
  const mt=1-t;
  return {
    x: mt*mt*mt*x0 + 3*mt*mt*t*x1 + 3*mt*t*t*x2 + t*t*t*x3,
    y: mt*mt*mt*y0 + 3*mt*mt*t*y1 + 3*mt*t*t*y2 + t*t*t*y3
  };
}

// ─── SEED stage ───────────────────────────────────────────────────────────────
function drawSeed(ctx, cx, gy, rng) {
  // soil crack
  ctx.strokeStyle = 'rgba(60,35,10,0.6)';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(cx-2, gy);
  ctx.lineTo(cx+1, gy+4);
  ctx.lineTo(cx-1, gy+7);
  ctx.stroke();

  // seed shape — teardrop
  ctx.save();
  ctx.translate(cx, gy+2);
  ctx.rotate(-0.2);
  const sg = ctx.createRadialGradient(-2,-3,0, 0,0,9);
  sg.addColorStop(0, '#c8a060');
  sg.addColorStop(0.5, '#8a5a20');
  sg.addColorStop(1, '#4a2e0a');
  ctx.fillStyle = sg;
  ctx.beginPath();
  ctx.ellipse(0, 0, 5.5, 8, 0, 0, Math.PI*2);
  ctx.fill();
  // seed ridge line
  ctx.strokeStyle = 'rgba(200,160,80,0.4)';
  ctx.lineWidth = 0.7;
  ctx.beginPath();
  ctx.moveTo(0, -7); ctx.lineTo(0, 6);
  ctx.stroke();
  ctx.restore();

  // subtle underground glow
  const gl = ctx.createRadialGradient(cx, gy+2, 0, cx, gy+2, 20);
  gl.addColorStop(0, 'rgba(120,80,30,0.15)');
  gl.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = gl;
  ctx.beginPath();
  ctx.ellipse(cx, gy+2, 20, 14, 0, 0, Math.PI*2);
  ctx.fill();
}

// ─── CRACK/SPROUT stage ───────────────────────────────────────────────────────
function drawCrack(ctx, cx, gy, rng) {
  // tiny hypocotyl (embryonic stem) — 2 cotyledon leaves
  const h = 16;
  const stemW = 2.2;

  // stem
  const sg2 = ctx.createLinearGradient(cx-stemW, gy, cx+stemW, gy-h);
  sg2.addColorStop(0, 'rgb(90,120,50)');
  sg2.addColorStop(1, 'rgb(120,160,60)');
  drawBranchSeg(ctx, cx, gy, cx+1.5, gy-h, stemW, 1.2, 'rgb(100,135,55)', rng);

  // cotyledon leaves — rounded, fleshy
  [[-1, 0.45],[1, -0.45]].forEach(([side, rot])=>{
    ctx.save();
    ctx.translate(cx+1.5, gy-h+2);
    ctx.rotate(rot * side);
    ctx.beginPath();
    ctx.ellipse(side*9, -3, 8, 5, -0.3*side, 0, Math.PI*2);
    const lg = ctx.createRadialGradient(side*7, -4, 0, side*9, -3, 9);
    lg.addColorStop(0, 'rgba(150,200,80,0.95)');
    lg.addColorStop(0.6, 'rgba(100,155,50,0.9)');
    lg.addColorStop(1, 'rgba(70,110,35,0.85)');
    ctx.fillStyle = lg;
    ctx.fill();
    ctx.restore();
  });

  // soil crack
  ctx.strokeStyle = 'rgba(40,25,8,0.8)';
  ctx.lineWidth = 1;
  [[-4,3],[3,-2]].forEach(([ox,oy])=>{
    ctx.beginPath();
    ctx.moveTo(cx+ox, gy);
    ctx.lineTo(cx+ox*1.5, gy+4);
    ctx.stroke();
  });
}

// ─── SPROUT stage — small plant ───────────────────────────────────────────────
function drawSprout(ctx, cx, gy, rng) {
  const h = 38;
  // main stem
  drawBranchSeg(ctx, cx, gy, cx+2, gy-h, 3.5, 1.6, 'rgb(90,120,45)', rng);

  // first true leaf pair
  [[-1,1],[1,-1]].forEach(([side,tilt])=>{
    const lx = cx + side*2, ly = gy - h*0.55;
    ctx.save();
    ctx.translate(lx, ly);
    ctx.rotate(tilt * 0.6);
    // petiole
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(side*7, -4);
    ctx.strokeStyle = 'rgba(90,130,40,0.8)';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    // leaf blade
    ctx.beginPath();
    ctx.ellipse(side*11, -6, 10, 6, -tilt*0.4, 0, Math.PI*2);
    const lg = ctx.createRadialGradient(side*9,-7,0,side*11,-6,11);
    lg.addColorStop(0,'rgba(160,210,80,0.95)');
    lg.addColorStop(0.7,'rgba(100,155,45,0.92)');
    lg.addColorStop(1,'rgba(70,110,30,0.85)');
    ctx.fillStyle = lg;
    ctx.fill();
    // vein
    ctx.beginPath();
    ctx.moveTo(side*2,-3);
    ctx.lineTo(side*20,-9);
    ctx.strokeStyle='rgba(180,230,100,0.35)';
    ctx.lineWidth=0.5;
    ctx.stroke();
    ctx.restore();
  });

  // top bud — 2-3 small leaves
  [[-0.4,0],[0,-0.1],[0.4,0.05]].forEach(([ox,oy],i)=>{
    ctx.save();
    ctx.translate(cx+2+ox*12, gy-h-2+oy*8);
    ctx.rotate(ox*1.1);
    ctx.beginPath();
    ctx.ellipse(0, 0, 7+i*1.5, 4+i, 0, 0, Math.PI*2);
    ctx.fillStyle=`rgba(${140+i*10},${195+i*5},70,${0.9-i*0.05})`;
    ctx.fill();
    ctx.restore();
  });
}

// ─── Draw full grown stage (sapling+) ─────────────────────────────────────────
function drawTree(ctx, cx, gy, trunkH, trunkW, maxDepth, nRoots, rng) {
  const seed = Math.floor(rng()*10000);
  const rng2 = seededRng(seed+1);

  // roots first (behind trunk)
  if(nRoots > 0){
    const angles = [-70,-45,-25,25,50,75].slice(0, nRoots);
    angles.forEach((deg, i)=>{
      const a = deg*Math.PI/180;
      const len = (20+rng2()*12) * (nRoots/6);
      const w0 = (2.5 + rng2()*1.2) * (nRoots/6);
      const ex = cx + Math.cos(a)*len;
      const ey = gy + Math.abs(Math.sin(a))*len*0.5;
      const cx1 = cx + Math.cos(a)*len*0.45 + (rng2()-0.5)*8;
      const cy1 = gy + Math.abs(Math.sin(a))*len*0.2;
      const gr = ctx.createLinearGradient(cx,gy,ex,ey);
      gr.addColorStop(0,`rgba(85,60,30,0.9)`);
      gr.addColorStop(1,`rgba(55,35,15,0)`);
      ctx.strokeStyle=gr;
      ctx.lineWidth=w0;
      ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(cx,gy);
      ctx.quadraticCurveTo(cx1,cy1,ex,ey);
      ctx.stroke();
    });
  }

  // collect leaf positions
  const leafData = [];

  // grow from base — trunk is first branch going upward
  const tipRng = seededRng(seed+2);
  growBranch(ctx, cx, gy, -Math.PI/2 + (tipRng()-0.5)*0.08, trunkH, trunkW, 0, maxDepth, tipRng, leafData);

  // draw leaf clusters
  leafData.forEach(ld => {
    const lr = seededRng(Math.floor(ld.x*7+ld.y*13));
    const size = 18 + lr()*14 + (maxDepth - ld.depth)*3;
    drawLeafCluster(ctx, ld.x, ld.y, size, lr);
  });
}

// ─── Stage definitions ────────────────────────────────────────────────────────
const W = 180, H = 220;
const stages = [
  {
    label:'种子', days:'第 0 天',
    draw(ctx,rng){ drawGround(ctx,W/2,H*0.72,W); drawSeed(ctx,W/2,H*0.72,rng); }
  },
  {
    label:'破土', days:'第 1 天',
    draw(ctx,rng){ drawGround(ctx,W/2,H*0.72,W); drawCrack(ctx,W/2,H*0.72,rng); }
  },
  {
    label:'嫩芽', days:'第 2–7 天',
    draw(ctx,rng){ drawGround(ctx,W/2,H*0.72,W); drawSprout(ctx,W/2,H*0.72,rng); }
  },
  {
    label:'幼苗', days:'第 8–30 天',
    draw(ctx,rng){
      drawGround(ctx,W/2,H*0.76,W);
      const r2=seededRng(42); drawTree(ctx,W/2,H*0.76,H*0.4,9,3,0,r2);
    }
  },
  {
    label:'少年树', days:'第 31–90 天',
    draw(ctx,rng){
      drawGround(ctx,W/2,H*0.8,W);
      const r2=seededRng(99); drawTree(ctx,W/2,H*0.8,H*0.55,13,4,3,r2);
    }
  },
  {
    label:'成年树', days:'第 91–300 天',
    draw(ctx,rng){
      drawGround(ctx,W/2,H*0.82,W);
      const r2=seededRng(217); drawTree(ctx,W/2,H*0.82,H*0.62,18,5,5,r2);
    }
  },
  {
    label:'古树', days:'第 300+ 天',
    draw(ctx,rng){
      drawGround(ctx,W/2,H*0.84,W);
      const r2=seededRng(301); drawTree(ctx,W/2,H*0.84,H*0.68,24,6,6,r2);
    }
  },
];

// ─── Render ───────────────────────────────────────────────────────────────────
const container = document.getElementById('stages');
stages.forEach((stage, si) => {
  const div = document.createElement('div');
  div.className = 'stage';

  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  div.appendChild(cv);

  const ctx = cv.getContext('2d');
  const rng = seededRng(si * 137 + 1);
  stage.draw(ctx, rng);

  const lbl = document.createElement('div');
  lbl.className = 'label';
  lbl.textContent = stage.label;
  const days = document.createElement('div');
  days.className = 'days';
  days.textContent = stage.days;

  div.appendChild(lbl);
  div.appendChild(days);
  container.appendChild(div);
});
</script>
</body>
</html>
