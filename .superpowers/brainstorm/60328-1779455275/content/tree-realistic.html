<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>真实感树形 — 成长阶段</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: system-ui, sans-serif;
  background: #07090A;
  color: #e8e8ec;
  padding: 1.5rem 1rem 3rem;
  min-height: 100vh;
}
h1 { text-align:center; font-size:1.3rem; font-weight:600; margin-bottom:.35rem; }
.sub { text-align:center; color:rgba(232,232,236,0.38); font-size:.82rem; margin-bottom:1.6rem; }

.row {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  max-width: 1080px;
  margin: 0 auto 1.5rem;
}

.card {
  background: #0E1010;
  border: 2px solid rgba(255,255,255,0.06);
  border-radius: 14px;
  padding: 10px 10px 10px;
  width: 148px;
  cursor: pointer;
  text-align: center;
  transition: border-color .2s, transform .15s;
}
.card:hover { border-color: rgba(74,124,89,.45); transform: translateY(-2px); }
.card.sel { border-color: #4A7C59; background: rgba(74,124,89,.07); }
canvas { display:block; border-radius:8px; }
.nm { font-size:.68rem; font-weight:700; color:#5A9C68; text-transform:uppercase; letter-spacing:.08em; margin-top:7px; }
.dy { font-size:.58rem; color:rgba(255,255,255,0.26); margin:2px 0 5px; }
.ds { font-size:.62rem; color:rgba(255,255,255,0.38); line-height:1.45; }
.badge { display:inline-block; font-size:.54rem; padding:1px 7px; border-radius:20px; margin-bottom:4px;
  background:rgba(74,124,89,.2); border:1px solid rgba(74,124,89,.4); color:#6B9B7A; }
.hint { text-align:center; color:rgba(255,255,255,0.16); font-size:.72rem; margin-top:1.2rem; }
</style>
</head>
<body>
<h1>有机叶团 + 树干 + 根系</h1>
<p class="sub">真实感树形 · 可见树干 · 分叉枝丫 · 叶团 blob · 根系</p>
<div class="row" id="row"></div>
<p class="hint">点击选择 · 在终端告诉我哪里需要调整</p>

<script>
const W = 130, H = 200;
const DPR = Math.min(window.devicePixelRatio || 1, 2);

// ── Palette ──
const BR  = [105, 78, 48];   // bark brown
const LF  = [74, 124, 89];   // leaf green (base)
const LF2 = [107, 155, 122]; // leaf highlight
const LF3 = [52,  95,  65];  // leaf shadow
const RT  = [88,  65,  38];  // root

function rgba(c, a) { return 'rgba('+c[0]+','+c[1]+','+c[2]+','+a+')'; }
function lerp(a,b,t){ return a+(b-a)*t; }

// ── Drawing helpers ──

function drawSoil(ctx, cx, by) {
  var g = ctx.createLinearGradient(cx-60,by,cx+60,by);
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(.3, rgba(BR,.32));
  g.addColorStop(.7, rgba(BR,.32));
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g; ctx.fillRect(cx-60,by,120,5);
}

function drawAmbientGlow(ctx, cx, cy, r, a) {
  var g = ctx.createRadialGradient(cx,cy,0,cx,cy,r);
  g.addColorStop(0, rgba(LF, a));
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g; ctx.fillRect(cx-r,cy-r,r*2,r*2);
}

function drawTrunk(ctx, cx, by, h, w, lean) {
  lean = lean || 0;
  ctx.beginPath();
  // subtle curve: trunk leans slightly
  ctx.moveTo(cx, by);
  ctx.bezierCurveTo(
    cx + lean*0.3, by - h*0.35,
    cx + lean*0.6, by - h*0.65,
    cx + lean,     by - h
  );
  ctx.lineWidth = w;
  ctx.strokeStyle = rgba(BR, .92);
  ctx.lineCap = 'round';
  ctx.stroke();
  // inner highlight
  ctx.beginPath();
  ctx.moveTo(cx - w*0.2, by - h*0.1);
  ctx.bezierCurveTo(
    cx + lean*0.3 - w*0.2, by - h*0.35,
    cx + lean*0.6 - w*0.2, by - h*0.65,
    cx + lean    - w*0.2, by - h
  );
  ctx.lineWidth = w*0.28;
  ctx.strokeStyle = rgba([lerp(BR[0],255,.18)|0, lerp(BR[1],255,.18)|0, lerp(BR[2],255,.15)|0], .30);
  ctx.stroke();
}

function trunkTop(cx, by, h, lean) {
  lean = lean || 0;
  // cubic bezier at t=1 endpoint
  return { x: cx + lean, y: by - h };
}

function drawBranch(ctx, x1, y1, x2, y2, w, alpha) {
  ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
  ctx.lineWidth = w; ctx.lineCap = 'round';
  ctx.strokeStyle = rgba(BR, alpha || .75);
  ctx.stroke();
}

function leafBlob(ctx, cx, cy, rx, ry, angle, alpha, hilight) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle || 0);
  // shadow blob
  var gs = ctx.createRadialGradient(rx*.1, ry*.1, 0, 0, 0, Math.max(rx,ry));
  gs.addColorStop(0,   rgba(LF,  (alpha||.5) * 1.0));
  gs.addColorStop(0.5, rgba(LF3, (alpha||.5) * 0.7));
  gs.addColorStop(1,   'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.ellipse(0,0,rx,ry,0,0,Math.PI*2);
  ctx.fillStyle = gs; ctx.fill();
  // highlight
  if (hilight !== false) {
    var gh = ctx.createRadialGradient(-rx*.25,-ry*.3,0,-rx*.25,-ry*.3,Math.max(rx,ry)*.6);
    gh.addColorStop(0, rgba(LF2, (alpha||.5)*.55));
    gh.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.beginPath(); ctx.ellipse(-rx*.15,-ry*.2,rx*.7,ry*.65,0,0,Math.PI*2);
    ctx.fillStyle=gh; ctx.fill();
  }
  ctx.restore();
}

function drawRoot(ctx, cx, by, len, angle, w, alpha) {
  var ex = cx + Math.cos(angle)*len;
  var ey = by - Math.sin(angle)*len;
  var cp1x = cx + Math.cos(angle+.3)*len*.45;
  var cp1y = by - Math.sin(angle+.3)*len*.45;
  ctx.beginPath(); ctx.moveTo(cx, by);
  ctx.quadraticCurveTo(cp1x, cp1y, ex, ey);
  ctx.lineWidth = w; ctx.strokeStyle = rgba(RT, alpha||.35);
  ctx.lineCap = 'round'; ctx.stroke();
  // finer sub-root
  if (w > 1.2) {
    var ex2 = ex + Math.cos(angle+.4)*len*.35;
    var ey2 = ey - Math.sin(angle+.4)*len*.35;
    ctx.beginPath(); ctx.moveTo(ex,ey); ctx.lineTo(ex2,ey2);
    ctx.lineWidth = w*.45; ctx.strokeStyle = rgba(RT, (alpha||.35)*.6);
    ctx.stroke();
  }
}

function drawRoots(ctx, cx, by, scale) {
  scale = scale || 1;
  // left roots
  drawRoot(ctx, cx, by, 32*scale, Math.PI+.45, 3*scale, .38);
  drawRoot(ctx, cx, by, 22*scale, Math.PI+.65, 1.8*scale, .28);
  drawRoot(ctx, cx, by, 28*scale, Math.PI+.25, 2.2*scale, .32);
  // right roots
  drawRoot(ctx, cx, by, 30*scale, -.40, 2.8*scale, .35);
  drawRoot(ctx, cx, by, 20*scale, -.62, 1.6*scale, .26);
  drawRoot(ctx, cx, by, 26*scale, -.22, 2*scale, .30);
  // center tap
  drawRoot(ctx, cx, by, 16*scale, -Math.PI/2+.08, 2.5*scale, .20);
}

// ─────────────────────────────────────────────
// Stage renderers
// ─────────────────────────────────────────────

function drawSeed(ctx) {
  var cx=W/2, cy=H*.60;
  drawSoil(ctx, cx, cy+16);
  // outer glow
  drawAmbientGlow(ctx, cx, cy, 38, .09);
  // halo
  var h=ctx.createRadialGradient(cx,cy,2,cx,cy,22);
  h.addColorStop(0, rgba(LF,.55));
  h.addColorStop(.5, rgba(LF,.14));
  h.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(cx,cy,22,0,Math.PI*2);
  ctx.fillStyle=h; ctx.fill();
  // seed body
  ctx.save(); ctx.translate(cx,cy); ctx.rotate(-.12);
  ctx.beginPath(); ctx.ellipse(0,0,7,10,0,0,Math.PI*2);
  ctx.fillStyle=rgba([BR[0]+22,BR[1]+18,BR[2]+12],.92); ctx.fill();
  ctx.strokeStyle=rgba(LF,.55); ctx.lineWidth=1.2; ctx.stroke();
  // seed texture line
  ctx.beginPath(); ctx.moveTo(0,-8); ctx.lineTo(0,8);
  ctx.strokeStyle=rgba(BR,.30); ctx.lineWidth=.8; ctx.stroke();
  ctx.restore();
  // tiny sparkles
  var pts=[[cx+18,cy-8],[cx-16,cy+5],[cx+6,cy-20],[cx-10,cy-16],[cx+20,cy+10]];
  pts.forEach(function(p){
    ctx.beginPath(); ctx.arc(p[0],p[1],1.2,0,Math.PI*2);
    ctx.fillStyle=rgba(LF2,.45); ctx.fill();
  });
}

function drawCrack(ctx) {
  var cx=W/2, by=H-24;
  drawSoil(ctx,cx,by); drawAmbientGlow(ctx,cx,by-16,24,.07);
  // cracked soil hints
  ctx.beginPath(); ctx.moveTo(cx-3,by); ctx.lineTo(cx,by-8); ctx.lineTo(cx+4,by);
  ctx.strokeStyle=rgba(BR,.18); ctx.lineWidth=1; ctx.stroke();
  // tiny stem
  var stemH=H*.07;
  ctx.beginPath(); ctx.moveTo(cx,by); ctx.lineTo(cx+1,by-stemH);
  ctx.lineWidth=2.8; ctx.strokeStyle=rgba(BR,.85); ctx.lineCap='round'; ctx.stroke();
  // first micro fork
  var tx=cx+1, ty=by-stemH;
  ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(tx-7,ty-5);
  ctx.lineWidth=1.4; ctx.strokeStyle=rgba(BR,.55); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(tx+6,ty-6);
  ctx.lineWidth=1.3; ctx.strokeStyle=rgba(BR,.50); ctx.stroke();
  // micro leaf blobs
  leafBlob(ctx, tx-7, ty-6, 5, 4, -.4, .5);
  leafBlob(ctx, tx+6, ty-7, 5, 4,  .4, .45);
  leafBlob(ctx, tx,   ty-2, 4, 5,   0, .40);
}

function drawSprout(ctx) {
  var cx=W/2, by=H-24;
  var th=H*.20;
  drawSoil(ctx,cx,by); drawAmbientGlow(ctx,cx,by-th*.5,40,.09);
  // thin trunk
  drawTrunk(ctx, cx, by, th, 3.5, 3);
  var tip = trunkTop(cx,by,th,3);
  // 2 small branches
  var b1x=tip.x-14, b1y=tip.y-8;
  var b2x=tip.x+12, b2y=tip.y-10;
  drawBranch(ctx, tip.x,tip.y, b1x,b1y, 1.6, .60);
  drawBranch(ctx, tip.x,tip.y, b2x,b2y, 1.5, .55);
  // tiny mid branch
  var midX=cx+2, midY=by-th*.55;
  drawBranch(ctx, midX,midY, midX-8,midY-6, 1.2, .45);
  // leaf blobs — small, sparse
  leafBlob(ctx, b1x, b1y-3,   9, 7, -.3, .55);
  leafBlob(ctx, b2x, b2y-3,  10, 7,  .3, .52);
  leafBlob(ctx, tip.x,tip.y-6, 8, 6,   0, .48);
  leafBlob(ctx, midX-8,midY-8, 6, 5, -.2, .40);
}

function drawSapling(ctx) {
  var cx=W/2, by=H-24;
  var th=H*.32;
  drawSoil(ctx,cx,by); drawAmbientGlow(ctx,cx,by-th*.5,55,.09);
  // trunk visible
  drawTrunk(ctx, cx, by, th, 5.5, 4);
  var tip = trunkTop(cx,by,th,4);
  // 2 main branches
  var b1x=tip.x-18, b1y=tip.y-12;
  var b2x=tip.x+16, b2y=tip.y-14;
  drawBranch(ctx, tip.x,tip.y, b1x,b1y, 2.2, .65);
  drawBranch(ctx, tip.x,tip.y, b2x,b2y, 2.0, .62);
  // sub-branches from main
  drawBranch(ctx, b1x,b1y, b1x-10,b1y-8, 1.4, .50);
  drawBranch(ctx, b1x,b1y, b1x+4, b1y-10,1.2, .45);
  drawBranch(ctx, b2x,b2y, b2x+8, b2y-8, 1.3, .48);
  // mid branch from trunk
  var mx=cx+2, my=by-th*.60;
  drawBranch(ctx, mx,my, mx-12,my-8, 1.6, .52);
  // leaf blobs
  leafBlob(ctx, b1x-10,b1y-10, 12, 9, -.3, .58);
  leafBlob(ctx, b1x+2, b1y-8,  10, 8,  .1, .54);
  leafBlob(ctx, b2x+8, b2y-10, 11, 8,  .3, .56);
  leafBlob(ctx, b2x-2, b2y-6,  9, 7, -.1, .50);
  leafBlob(ctx, tip.x, tip.y-8, 10, 9,  0, .52);
  leafBlob(ctx, mx-12, my-10,   8, 7, -.2, .45);
}

function drawYoung(ctx) {
  var cx=W/2, by=H-24;
  var th=H*.45;
  drawSoil(ctx,cx,by); drawAmbientGlow(ctx,cx,by-th*.45,75,.10);
  drawRoots(ctx,cx,by,.65);
  drawTrunk(ctx, cx, by, th, 8, 5);
  var tip=trunkTop(cx,by,th,5);
  // 3 main branches
  var b1x=tip.x-22,b1y=tip.y-14;
  var b2x=tip.x+19,b2y=tip.y-16;
  var b3x=cx+3,    b3y=by-th*.62;
  drawBranch(ctx,tip.x,tip.y,b1x,b1y,3,.70);
  drawBranch(ctx,tip.x,tip.y,b2x,b2y,2.8,.67);
  drawBranch(ctx,b3x,b3y,b3x-16,b3y-10,2,.58);
  // sub-branches
  drawBranch(ctx,b1x,b1y,b1x-12,b1y-10,1.8,.55);
  drawBranch(ctx,b1x,b1y,b1x+5, b1y-12,1.5,.50);
  drawBranch(ctx,b2x,b2y,b2x+10,b2y-10,1.6,.52);
  drawBranch(ctx,b2x,b2y,b2x-4, b2y-12,1.4,.48);
  // leaf blobs — denser
  leafBlob(ctx,b1x-12,b1y-12,15,12,-.3,.60);
  leafBlob(ctx,b1x+2, b1y-10,13,10, .1,.57);
  leafBlob(ctx,b2x+10,b2y-12,14,11, .3,.60);
  leafBlob(ctx,b2x-3, b2y-8, 12,10,-.1,.55);
  leafBlob(ctx,tip.x, tip.y-10,14,12, 0,.58);
  leafBlob(ctx,b3x-16,b3y-12,11, 9,-.2,.50);
  leafBlob(ctx,b3x-8, b3y-5,  9, 8,  0,.46);
}

function drawMature(ctx) {
  var cx=W/2, by=H-24;
  var th=H*.57;
  drawSoil(ctx,cx,by); drawAmbientGlow(ctx,cx,by-th*.42,95,.11);
  drawRoots(ctx,cx,by,1.0);
  drawTrunk(ctx,cx,by,th,11,6);
  var tip=trunkTop(cx,by,th,6);
  // 4 main branches — spreading wide
  var b1x=tip.x-28,b1y=tip.y-16;
  var b2x=tip.x+25,b2y=tip.y-18;
  var bm1x=cx+2,   bm1y=by-th*.65;
  var bm2x=cx+3,   bm2y=by-th*.48;
  drawBranch(ctx,tip.x,tip.y,b1x,b1y,4,.72);
  drawBranch(ctx,tip.x,tip.y,b2x,b2y,3.8,.70);
  drawBranch(ctx,bm1x,bm1y,bm1x-20,bm1y-12,2.8,.62);
  drawBranch(ctx,bm2x,bm2y,bm2x+18,bm2y-10,2.5,.58);
  // sub-branches
  drawBranch(ctx,b1x,b1y,b1x-14,b1y-12,2.4,.58);
  drawBranch(ctx,b1x,b1y,b1x+6, b1y-14,2.0,.54);
  drawBranch(ctx,b2x,b2y,b2x+12,b2y-12,2.2,.56);
  drawBranch(ctx,b2x,b2y,b2x-5, b2y-14,1.9,.52);
  // tertiary
  drawBranch(ctx,b1x-14,b1y-12,b1x-20,b1y-20,1.4,.45);
  drawBranch(ctx,b2x+12,b2y-12,b2x+18,b2y-20,1.3,.43);
  // leaf blobs — full crown
  leafBlob(ctx,b1x-14,b1y-16,18,14,-.35,.62);
  leafBlob(ctx,b1x+2, b1y-12,16,13, .10,.60);
  leafBlob(ctx,b1x-22,b1y-22,14,11,-.25,.56);
  leafBlob(ctx,b2x+12,b2y-16,17,14, .35,.62);
  leafBlob(ctx,b2x-4, b2y-12,15,13,-.10,.60);
  leafBlob(ctx,b2x+18,b2y-22,13,11, .25,.56);
  leafBlob(ctx,tip.x, tip.y-12,16,14,  0,.62);
  leafBlob(ctx,bm1x-20,bm1y-14,13,10,-.20,.52);
  leafBlob(ctx,bm2x+18,bm2y-12,12,10, .20,.50);
  // crown density fill
  leafBlob(ctx,tip.x-8,tip.y-22,12,10,-.15,.42,false);
  leafBlob(ctx,tip.x+6,tip.y-24,11,10, .15,.40,false);
}

function drawAncient(ctx) {
  var cx=W/2, by=H-24;
  var th=H*.65;
  drawSoil(ctx,cx,by); drawAmbientGlow(ctx,cx,by-th*.40,115,.13);
  drawRoots(ctx,cx,by,1.35);
  drawTrunk(ctx,cx,by,th,14,7);
  var tip=trunkTop(cx,by,th,7);
  // 4 massive branches
  var b1x=tip.x-34,b1y=tip.y-18;
  var b2x=tip.x+30,b2y=tip.y-20;
  var bm1x=cx+2,   bm1y=by-th*.67;
  var bm2x=cx+3,   bm2y=by-th*.50;
  drawBranch(ctx,tip.x,tip.y,b1x,b1y,5.5,.75);
  drawBranch(ctx,tip.x,tip.y,b2x,b2y,5.2,.73);
  drawBranch(ctx,bm1x,bm1y,bm1x-24,bm1y-14,3.8,.65);
  drawBranch(ctx,bm2x,bm2y,bm2x+22,bm2y-12,3.4,.62);
  // sub
  drawBranch(ctx,b1x,b1y,b1x-16,b1y-14,3.0,.60);
  drawBranch(ctx,b1x,b1y,b1x+8, b1y-16,2.6,.56);
  drawBranch(ctx,b2x,b2y,b2x+14,b2y-14,2.8,.58);
  drawBranch(ctx,b2x,b2y,b2x-7, b2y-16,2.4,.54);
  // tertiary
  drawBranch(ctx,b1x-16,b1y-14,b1x-24,b1y-24,1.8,.46);
  drawBranch(ctx,b2x+14,b2y-14,b2x+22,b2y-24,1.7,.44);
  drawBranch(ctx,b1x+8, b1y-16,b1x+4, b1y-26,1.5,.42);
  drawBranch(ctx,b2x-7, b2y-16,b2x-4, b2y-26,1.5,.42);
  // massive leaf crown
  leafBlob(ctx,b1x-16,b1y-18,21,16,-.38,.65);
  leafBlob(ctx,b1x+4, b1y-14,19,15, .12,.63);
  leafBlob(ctx,b1x-26,b1y-26,16,13,-.28,.58);
  leafBlob(ctx,b1x+2, b1y-28,14,12, .05,.54);
  leafBlob(ctx,b2x+14,b2y-18,20,16, .38,.65);
  leafBlob(ctx,b2x-5, b2y-14,18,15,-.12,.63);
  leafBlob(ctx,b2x+24,b2y-26,15,13, .28,.58);
  leafBlob(ctx,b2x-2, b2y-28,14,12,-.05,.54);
  leafBlob(ctx,tip.x, tip.y-14,18,16,  0,.65);
  leafBlob(ctx,bm1x-24,bm1y-16,15,12,-.22,.55);
  leafBlob(ctx,bm2x+22,bm2y-14,14,12, .22,.53);
  // crown fill
  leafBlob(ctx,tip.x-12,tip.y-28,14,12,-.18,.44,false);
  leafBlob(ctx,tip.x+10, tip.y-30,13,12, .18,.42,false);
  leafBlob(ctx,b1x-6,  b1y-34,12,10, -.1,.38,false);
  leafBlob(ctx,b2x+4,  b2y-34,12,10,  .1,.38,false);
}

// ─── Stages list ───
var stages = [
  { id:'seed',    nm:'种子',  dy:'0 天',       badge:false, ds:'一粒发光种子落入土中，等待发芽', fn:drawSeed },
  { id:'crack',   nm:'破土',  dy:'第 1 天',     badge:true,  ds:'第一根嫩芽破土，两片微小叶簇', fn:drawCrack },
  { id:'sprout',  nm:'嫩芽',  dy:'2 – 7 天',   badge:true,  ds:'主干 + 初级分叉，叶团稀疏', fn:drawSprout },
  { id:'sapling', nm:'树苗',  dy:'8 – 30 天',   badge:false, ds:'两主枝 + 次级叉，能认出树的形态', fn:drawSapling },
  { id:'young',   nm:'幼树',  dy:'31 – 90 天',  badge:false, ds:'三主枝，根系初现，树冠成形', fn:drawYoung },
  { id:'mature',  nm:'茂盛',  dy:'91 – 300 天', badge:false, ds:'四主枝展开，完整根系，密叶冠', fn:drawMature },
  { id:'ancient', nm:'参天',  dy:'301 天+',     badge:false, ds:'树冠充满画面，粗根扎地，最大', fn:drawAncient }
];

var row = document.getElementById('row');
stages.forEach(function(s) {
  var card = document.createElement('div');
  card.className = 'card';

  var cvs = document.createElement('canvas');
  cvs.width  = W * DPR;
  cvs.height = H * DPR;
  cvs.style.width  = W + 'px';
  cvs.style.height = H + 'px';
  var ctx = cvs.getContext('2d');
  ctx.scale(DPR, DPR);
  ctx.clearRect(0,0,W,H);
  try { s.fn(ctx); } catch(e){ console.error(s.id,e); }
  card.appendChild(cvs);

  var info = document.createElement('div');
  info.innerHTML =
    '<div class="nm">'+s.nm+'</div>' +
    '<div class="dy">'+s.dy+'</div>' +
    (s.badge ? '<span class="badge">新增阶段</span><br>' : '') +
    '<div class="ds">'+s.ds+'</div>';
  card.appendChild(info);

  card.onclick = function(){
    card.classList.toggle('sel');
    try{fetch('/event',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'click',choice:s.id,text:s.nm})});}catch(e){}
  };
  row.appendChild(card);
});
</script>
</body>
</html>
